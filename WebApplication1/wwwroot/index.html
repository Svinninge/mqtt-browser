<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Dashboard</title>
    <!-- Leaflet CSS for maps -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .status {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .status.connected {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }

        .status.disconnected {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
            word-break: break-all;
            font-size: 0.85em;
        }

        .card-value {
            font-size: 1.5em;
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }

        .card-timestamp {
            font-size: 0.75em;
            color: #999;
        }

        .empty-state {
            background: white;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            color: #999;
        }

        .empty-state h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .controls {
            text-align: center;
            margin-top: 20px;
        }

        button {
            background: white;
            color: #667eea;
            border: 2px solid white;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        button:hover {
            background: #667eea;
            color: white;
        }

        .info {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 30px;
            text-align: center;
            font-size: 0.9em;
        }

        .spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Map styles */
        .map-section {
            margin-bottom: 40px;
        }

        #map {
            width: 100%;
            height: 500px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .map-info {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .map-info h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .location-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .location-detail {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        .location-detail label {
            font-weight: bold;
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }

        .location-detail value {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 MQTT Dashboard</h1>
            <div class="status" id="statusIndicator">
                <span class="spinner"></span> Connecting...
            </div>
        </header>

        <!-- Map section for motorhome -->
        <div class="map-section">
            <h2 style="color: white; margin-bottom: 20px;">📍 Motorhome Position</h2>
            <div id="map"></div>
            <div class="map-info" id="mapInfo" style="display: none;">
                <h3>🚐 Motorhome - RUTX50</h3>
                <div class="location-details" id="locationDetails"></div>
            </div>
        </div>

        <div id="dashboard" class="dashboard"></div>

        <div class="controls">
            <button onclick="refreshData()">🔄 Refresh Now</button>
            <button onclick="clearData()">🗑️ Clear Data</button>
        </div>

        <div class="info">
            <p>📊 Dashboard updates automatically every 2 seconds</p>
            <p id="dataCount">Waiting for data...</p>
        </div>
    </div>

    <!-- Leaflet JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        let mqttConnected = false;
        const updateInterval = 2000; // 2 seconds

        // Format values for display
        function formatValue(value) {
            // Try to parse as JSON
            try {
                const json = JSON.parse(value);
                // If it's an object, format it nicely
                if (typeof json === 'object' && json !== null) {
                    return JSON.stringify(json, null, 2);
                }
            } catch (e) {
                // Not JSON, treat as regular string
            }
            
            // Too much text - truncate
            if (value.length > 200) {
                return value.substring(0, 200) + '...';
            }
            return value;
        }

        // Get a nice icon based on topic name
        function getIconForTopic(topic) {
            const topicLower = topic.toLowerCase();
            if (topicLower.includes('alarm')) return '🚨';
            if (topicLower.includes('temp') || topicLower.includes('thermos')) return '🌡️';
            if (topicLower.includes('price') || topicLower.includes('pris')) return '💰';
            if (topicLower.includes('power') || topicLower.includes('effekt') || topicLower.includes('pulse')) return '⚡';
            if (topicLower.includes('gps') || topicLower.includes('location')) return '📍';
            if (topicLower.includes('gsm') || topicLower.includes('signal')) return '📡';
            if (topicLower.includes('ftx') || topicLower.includes('ventil')) return '💨';
            if (topicLower.includes('status')) return '✅';
            if (topicLower.includes('error')) return '❌';
            return '📌';
        }

        // Update MQTT data from the server
        async function refreshData() {
            try {
                const response = await fetch('/api/mqtt-data');
                const data = await response.json();
                
                const dashboard = document.getElementById('dashboard');
                const statusIndicator = document.getElementById('statusIndicator');
                const dataCount = document.getElementById('dataCount');

                // Uppdatera kartan med motorhemmets position
                updateMapLocation(data);

                if (Object.keys(data).length === 0) {
                    dashboard.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <h2>⏳ Waiting for Data</h2>
                            <p>MQTT broker is connected but has not received any messages yet.</p>
                        </div>
                    `;
                    statusIndicator.className = 'status connected';
                    statusIndicator.innerHTML = '<span class="spinner"></span> Connected (waiting for data)';
                    dataCount.textContent = '0 messages received';
                } else {
                    // Create cards for each MQTT topic, sorted alphabetically
                    let html = '';
                    const sortedData = Object.entries(data).sort((a, b) => a[0].localeCompare(b[0]));
                    
                    sortedData.forEach(([topic, value]) => {
                        const icon = getIconForTopic(topic);
                        const formattedValue = formatValue(value);
                        const isJson = value.startsWith('{') || value.startsWith('[');
                        
                        html += `
                            <div class="card">
                                <div class="card-title">${icon} ${topic}</div>
                                <div class="card-value" style="${isJson ? 'font-family: monospace; font-size: 0.85em;' : ''}">${escapeHtml(formattedValue)}</div>
                                <div class="card-timestamp">Updated just now</div>
                            </div>
                        `;
                    });
                    
                    dashboard.innerHTML = html;
                    statusIndicator.className = 'status connected';
                    statusIndicator.innerHTML = '<span class="spinner"></span> Connected (' + Object.keys(data).length + ' topics)';
                    dataCount.textContent = `${Object.keys(data).length} messages from MQTT broker`;
                }
                
                mqttConnected = true;
            } catch (error) {
                console.error('Error retrieving MQTT data:', error);
                const statusIndicator = document.getElementById('statusIndicator');
                statusIndicator.className = 'status disconnected';
                statusIndicator.innerHTML = '❌ Disconnected';
                mqttConnected = false;
            }
        }

        // Escape HTML for security
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Map management
        let map = null;
        let marker = null;

        function initializeMap() {
            if (!map) {
                // Initialize map with start position (Sweden)
                map = L.map('map').setView([59.33, 18.07], 6);
                
                // Add map layer from OpenStreetMap
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors',
                    maxZoom: 19
                }).addTo(map);
            }
        }

        function updateMapLocation(data) {
            initializeMap();

            // Get motorhome data
            const rutx50Data = data['motorhome/rutx50'];
            if (rutx50Data) {
                try {
                    const gpsData = JSON.parse(rutx50Data).GPS;
                    const lat = gpsData.latitude;
                    const lon = gpsData.longitude;
                    const altitude = gpsData.altitude;
                    const speed = gpsData.speed;
                    const accuracy = gpsData.accuracy;
                    const date = gpsData.date;

                    // Update marker
                    if (marker) {
                        map.removeLayer(marker);
                    }

                    marker = L.marker([lat, lon], {
                        icon: L.icon({
                            iconUrl: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23667eea" width="32" height="32"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.9-3.1-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>',
                            iconSize: [32, 32],
                            iconAnchor: [16, 32]
                        })
                    }).addTo(map)
                    .bindPopup(`
                        <strong>🚐 Motorhome</strong><br>
                        Lat: ${lat.toFixed(6)}<br>
                        Lon: ${lon.toFixed(6)}<br>
                        Altitude: ${altitude.toFixed(1)}m<br>
                        Speed: ${speed.toFixed(1)} m/s<br>
                        Accuracy: ±${accuracy.toFixed(1)}m
                    `);

                    map.setView([lat, lon], 13);

                    // Update info panel
                    const mapInfo = document.getElementById('mapInfo');
                    const locationDetails = document.getElementById('locationDetails');
                    mapInfo.style.display = 'block';
                    
                    locationDetails.innerHTML = `
                        <div class="location-detail">
                            <label>📍 Latitude</label>
                            <value>${lat.toFixed(6)}</value>
                        </div>
                        <div class="location-detail">
                            <label>📍 Longitude</label>
                            <value>${lon.toFixed(6)}</value>
                        </div>
                        <div class="location-detail">
                            <label>📏 Altitude</label>
                            <value>${altitude.toFixed(1)} m</value>
                        </div>
                        <div class="location-detail">
                            <label>💨 Speed</label>
                            <value>${speed.toFixed(1)} m/s (${(speed * 3.6).toFixed(1)} km/h)</value>
                        </div>
                        <div class="location-detail">
                            <label>📡 Accuracy</label>
                            <value>±${accuracy.toFixed(1)} m</value>
                        </div>
                        <div class="location-detail">
                            <label>🕐 Time</label>
                            <value>${date}</value>
                        </div>
                    `;
                } catch (e) {
                    console.error('Error parsing GPS data:', e);
                }
            }
        }

        // Clear stored data
        function clearData() {
            if (confirm('Are you sure you want to clear all data?')) {
                document.getElementById('dashboard').innerHTML = '';
                document.getElementById('dataCount').textContent = '0 messages received';
            }
        }

        // Update data automatically
        setInterval(refreshData, updateInterval);

        // Initial update
        refreshData();
    </script>
</body>
</html>
